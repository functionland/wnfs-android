before_install:
  - git lfs pull
  - sdk install java 17.0.11-tem
  - sdk use java 17.0.11-tem
install:
  - ./gradlew lib:assembleRelease
  - FILE="-Dfile=lib/build/outputs/aar/lib-release.aar"
  - mvn install:install-file $FILE -DgroupId=com.github.functionland -DartifactId=wnfs-android -Dversion=1.0 -Dpackaging=aar -DgeneratePom=true
