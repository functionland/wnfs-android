name: Build the lib

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r28
        add-to-path: true

    - name: Configure NDK for Gradle
      run: |
        echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
        echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install latest stable Rust
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Install Cargo targets
      run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

    - name: Build
      run: ./gradlew lib:assembleRelease lib:releaseSourcesJar

    - name: Prepare release artifacts
      run: |
        mkdir -p release-artifacts
        cp ./lib/build/outputs/aar/lib-release.aar release-artifacts/mobile.aar
        cp ./lib/build/libs/*-sources.jar release-artifacts/mobile-sources.jar

    - name: Upload Release AAR
      uses: actions/upload-artifact@v4
      with:
        name: release-lib
        path: release-artifacts/mobile.aar

    - name: Upload Sources JAR
      uses: actions/upload-artifact@v4
      with:
        name: release-sources
        path: release-artifacts/mobile-sources.jar

    - name: Attach artifacts to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-artifacts/mobile.aar
          release-artifacts/mobile-sources.jar
