name: Build the lib

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-15-arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r28
        add-to-path: true

    - name: Set NDK environment
      run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install latest stable Rust
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Install Cargo targets
      run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

    - name: Build
      run: ./gradlew lib:assemble

    - name: Upload Debug AAR
      uses: actions/upload-artifact@v4
      with:
        name: debug-lib
        path: ./lib/build/outputs/aar/lib-debug.aar

    - name: Upload Release AAR
      uses: actions/upload-artifact@v4
      with:
        name: release-lib
        path: ./lib/build/outputs/aar/lib-release.aar

    - name: Attach AAR to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./lib/build/outputs/aar/lib-release.aar
          ./lib/build/outputs/aar/lib-debug.aar
